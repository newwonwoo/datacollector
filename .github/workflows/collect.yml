name: collector run

# 스케줄 + 수동 실행. GitHub Secrets에서 키를 주입해 0-Cost로 돌린다.
# Master_01 §6 + §8 정책.

on:
  workflow_dispatch:
    inputs:
      query:
        description: "검색어 (예: 단테 주식유튜버 가장 유명한 단타매매전략)"
        required: true
        default: "단타매매전략"
      count:
        description: "후보 영상 수"
        required: false
        default: "5"
  schedule:
    # UTC 21:00 = KST 06:00 매일. 무료 runner-minute 관리 차원에서 1회만.
    - cron: "0 21 * * *"

permissions:
  contents: write        # data_store 커밋용
  actions: read
  pages: write           # GitHub Pages 배포용
  id-token: write        # Pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt into Node.js 24 ahead of the June 2026 forced migration.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      GOOGLE_API_KEY:  ${{ secrets.GOOGLE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      COLLECTOR_LLM: gemini
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Sanity (no keys → mock, otherwise real)
        run: |
          python - <<'PY'
          import os
          have_yt = bool(os.environ.get("YOUTUBE_API_KEY"))
          have_llm = bool(os.environ.get("GOOGLE_API_KEY") or os.environ.get("ANTHROPIC_API_KEY"))
          print(f"YOUTUBE_API_KEY set: {have_yt}")
          print(f"LLM key set: {have_llm}")
          PY

      - name: Run pipeline
        run: |
          collector run \
            --query "${{ github.event.inputs.query || '단타매매전략' }}" \
            --count "${{ github.event.inputs.count || '5' }}"

      - name: Build dashboard
        run: collector dashboard --data-store data_store --html index/dashboard.html

      - name: Add index.html to Pages artifact (prefer docs/index.html)
        run: |
          if [ -f docs/index.html ]; then
            cp docs/index.html index/index.html
          else
            cat > index/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=dashboard.html">
          <title>Collector</title>
          <p>Redirecting to <a href="dashboard.html">dashboard</a>…</p>
          HTML
          fi

      - name: Copy dashboard to docs/ (no-Pages fallback)
        run: |
          mkdir -p docs
          cp index/dashboard.html docs/dashboard.html
          # Do NOT overwrite docs/index.html — it's the interactive app.

      - name: Upload raw artifacts (backup, always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-dashboard
          path: |
            index/dashboard.html
            index/collector.sqlite
            logs/events.jsonl

      - uses: actions/configure-pages@v5
        id: pages
        continue-on-error: true
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outcome == 'success'
        with:
          path: index

      - id: deploy
        if: steps.pages.outcome == 'success'
        uses: actions/deploy-pages@v4

      - name: Write dashboard URLs to summary
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          {
            echo "## 📊 대시보드 URL"
            echo ""
            if [ "${{ steps.pages.outcome }}" = "success" ]; then
              echo "### ✅ GitHub Pages (활성)"
              echo "- 🔗 **${{ steps.deploy.outputs.page_url }}**  (깔끔한 영구 URL, 북마크용)"
              echo ""
            else
              echo "### ⚠️  GitHub Pages 미활성"
              echo "한 번만 ON 하면 영구 URL이 생깁니다:"
              echo "https://github.com/$OWNER/$REPO/settings/pages → Source: GitHub Actions"
              echo ""
            fi
            echo "### 🌐 즉시 사용 (설정 불필요, 빠름)"
            echo "- 🔗 **https://raw.githack.com/$OWNER/$REPO/main/docs/dashboard.html**"
            echo "  (raw.githack.com CDN — 모바일/PC 브라우저에서 바로 렌더링)"
            echo ""
            echo "### 대안 URL"
            echo "- https://htmlpreview.github.io/?https://github.com/$OWNER/$REPO/blob/main/docs/dashboard.html"
            echo "  (가끔 느릴 수 있음)"
            echo "- https://github.com/$OWNER/$REPO/blob/main/docs/dashboard.html"
            echo "  (GitHub 내장 소스 뷰어)"
            echo "- 페이지 하단 **Artifacts** → \`collector-dashboard\` 다운로드"
          } >> $GITHUB_STEP_SUMMARY

      - name: Commit data_store + vault + docs
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # vault/ and data_store/ are .gitignored so local test runs don't pollute;
          # CI legitimately needs to publish them → -f to bypass .gitignore.
          git add -f data_store/ vault/ || true
          git add docs/ || true
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "data: automated collector run ${{ github.run_id }}"
            git push
          fi
